<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#10B981"/>
      <stop offset="100%" stop-color="#059669"/>
    </linearGradient>
    <linearGradient id="route" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#FDE68A"/>
      <stop offset="100%" stop-color="#F59E0B"/>
    </linearGradient>
  </defs>

  <!-- Background rounded square -->
  <rect width="512" height="512" rx="96" fill="url(#bg)"/>

  <!-- Bicycle wheel (rear) -->
  <circle cx="175" cy="330" r="72" fill="none" stroke="#fff" stroke-width="14"/>
  <circle cx="175" cy="330" r="8" fill="#fff"/>
  <!-- Spokes -->
  <line x1="175" y1="258" x2="175" y2="402" stroke="#fff" stroke-width="4" opacity="0.5"/>
  <line x1="103" y1="330" x2="247" y2="330" stroke="#fff" stroke-width="4" opacity="0.5"/>
  <line x1="124" y1="279" x2="226" y2="381" stroke="#fff" stroke-width="4" opacity="0.5"/>
  <line x1="226" y1="279" x2="124" y2="381" stroke="#fff" stroke-width="4" opacity="0.5"/>

  <!-- Bicycle wheel (front) -->
  <circle cx="365" cy="330" r="72" fill="none" stroke="#fff" stroke-width="14"/>
  <circle cx="365" cy="330" r="8" fill="#fff"/>
  <!-- Spokes -->
  <line x1="365" y1="258" x2="365" y2="402" stroke="#fff" stroke-width="4" opacity="0.5"/>
  <line x1="293" y1="330" x2="437" y2="330" stroke="#fff" stroke-width="4" opacity="0.5"/>
  <line x1="314" y1="279" x2="416" y2="381" stroke="#fff" stroke-width="4" opacity="0.5"/>
  <line x1="416" y1="279" x2="314" y2="381" stroke="#fff" stroke-width="4" opacity="0.5"/>

  <!-- Bicycle frame -->
  <!-- Seat tube -->
  <line x1="230" y1="230" x2="175" y2="330" stroke="#fff" stroke-width="14" stroke-linecap="round"/>
  <!-- Top tube -->
  <line x1="230" y1="230" x2="340" y2="240" stroke="#fff" stroke-width="14" stroke-linecap="round"/>
  <!-- Down tube -->
  <line x1="175" y1="330" x2="340" y2="240" stroke="#fff" stroke-width="14" stroke-linecap="round"/>
  <!-- Chain stay -->
  <line x1="175" y1="330" x2="270" y2="330" stroke="#fff" stroke-width="10" stroke-linecap="round"/>
  <!-- Seat stay -->
  <line x1="270" y1="330" x2="340" y2="240" stroke="#fff" stroke-width="10" stroke-linecap="round"/>
  <!-- Fork -->
  <line x1="340" y1="240" x2="365" y2="330" stroke="#fff" stroke-width="12" stroke-linecap="round"/>
  <!-- Handlebar -->
  <line x1="340" y1="240" x2="360" y2="220" stroke="#fff" stroke-width="12" stroke-linecap="round"/>
  <line x1="360" y1="220" x2="380" y2="225" stroke="#fff" stroke-width="10" stroke-linecap="round"/>
  <!-- Seat -->
  <line x1="218" y1="222" x2="248" y2="222" stroke="#fff" stroke-width="12" stroke-linecap="round"/>
  <!-- Seat post -->
  <line x1="233" y1="222" x2="230" y2="230" stroke="#fff" stroke-width="8" stroke-linecap="round"/>

  <!-- Route path (wavy line above bicycle) -->
  <path d="M 80 140 Q 140 90 200 130 Q 260 170 320 110 Q 370 60 430 100"
        fill="none" stroke="url(#route)" stroke-width="16" stroke-linecap="round" stroke-linejoin="round"/>

  <!-- Map pin at start -->
  <circle cx="80" cy="140" r="14" fill="#FDE68A"/>
  <circle cx="80" cy="140" r="6" fill="#059669"/>

  <!-- Map pin at end (destination) -->
  <g transform="translate(430, 76)">
    <path d="M 0 0 C -12 -8 -20 -20 -20 -30 C -20 -42 -10 -52 0 -52 C 10 -52 20 -42 20 -30 C 20 -20 12 -8 0 0 Z"
          fill="#F59E0B"/>
    <circle cx="0" cy="-30" r="8" fill="#fff"/>
  </g>
</svg>
